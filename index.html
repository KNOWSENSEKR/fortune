<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노센스 투자운세 v1.8</title>
    <style>
        :root { 
            --page-bg: #f8fafc; 
            --app-bg: #0f172a;  
            --card-bg: rgba(255, 255, 255, 0.05); 
            --primary-accent: #8b5cf6; 
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --invest-red: #ef4444;
            --lucky-gold: #f59e0b;
            --quote-purple: #a78bfa;
        }
        
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--page-bg); 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; color: #1e293b;
            padding-top: 5vh; 
        }

        .container { 
            width: 100%; max-width: 440px; 
            background-color: var(--app-bg); 
            border-radius: 32px; padding: 35px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); 
            text-align: center; box-sizing: border-box;
            color: var(--text-main);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { 
            font-size: 1.3rem; margin: 0; 
            background: linear-gradient(to right, #c084fc, #6366f1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 800; 
        }
        .yt-icon { color: #ff0000; text-decoration: none; }

        /* 모드 선택 탭 */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab { 
            flex: 1; padding: 12px 5px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; 
            font-size: 0.85rem; font-weight: 800; color: var(--text-dim); 
            cursor: pointer; transition: 0.3s; 
        }
        .tab.active { background: var(--primary-accent); color: #fff; border-color: var(--primary-accent); }

        /* 입력 폼 */
        .input-form { display: flex; flex-direction: column; gap: 15px; text-align: left; }
        .input-group label { font-size: 0.75rem; color: var(--text-dim); font-weight: 800; margin-left: 5px; margin-bottom: 5px; display: block;}
        
        input, select { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: #fff; font-size: 1rem; box-sizing: border-box;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary-accent); background: rgba(255,255,255,0.1); }
        select option { background: #1e293b; color: #fff; } /* 드롭다운 메뉴 색상 */
