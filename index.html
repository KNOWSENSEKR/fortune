<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노센스 투자운세 v1.3</title>
    <style>
        :root { 
            --page-bg: #f8fafc; /* 눈이 편안한 아주 연한 회색/흰색 배경 */
            --app-dark: #1a1d2e; /* 로또 분석기의 깊은 남색 */
            --primary-accent: #6c5ce7; 
            --text-white: #ffffff;
            --text-dim: #94a3b8;
            --invest-red: #ff4757;
            --lucky-gold: #ffa502;
            --quote-purple: #a55eea;
        }
        
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--page-bg); 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: #1e293b;
        }

        .container { 
            width: 100%; max-width: 440px; 
            background-color: var(--app-dark); /* 앱 본체는 다시 어둡고 세련되게 */
            border-radius: 30px; padding: 35px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            text-align: center; box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { 
            font-size: 1.3rem; margin: 0; 
            background: linear-gradient(to right, #a55eea, #45aaf2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 800; 
        }
        .yt-icon { color: #ff0000; text-decoration: none; transition: 0.2s; }

        /* 입력 폼 */
        .input-form { display: flex; flex-direction: column; gap: 15px; text-align: left; }
        .input-group label { font-size: 0.75rem; color: var(--text-dim); font-weight: 800; letter-spacing: 1px; margin-left: 5px; }
        input { 
            width: 100%; padding: 16px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: #fff; font-size: 1rem; box-sizing: border-box;
        }
        input:focus { outline: none; border-color: var(--primary-accent); background: rgba(255,255,255,0.1); }

        .btn-analyze { 
            background: linear-gradient(135deg, #6c5ce7, #a55eea); color: white; border: none;
            padding: 18px; border-radius: 15px; font-weight: 800; font-size: 1.1rem;
            cursor: pointer; margin-top: 10px; width: 100%; 
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
        }
