<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노센스 투자운세 v1.4</title>
    <style>
        /* 변수 설정 - 확실한 색상값 지정 */
        :root { 
            --page-bg: #ffffff;      /* 배경은 하얀색 */
            --app-bg: #111827;       /* 앱 본체는 진한 남색 */
            --card-bg: #1f2937;      /* 카드 배경 */
            --accent: #8b5cf6;       /* 보라색 포인트 */
            --text-main: #ffffff;    /* 앱 내부 글자 흰색 */
            --text-dim: #9ca3af;     /* 흐린 글자 */
        }
        
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--page-bg) !important; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh;
        }

        .container { 
            width: 100%; max-width: 420px; 
            background-color: var(--app-bg); 
            border-radius: 30px; padding: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            box-sizing: border-box;
            margin-top: 20px;
            color: var(--text-main);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { font-size: 1.3rem; margin: 0; color: #c084fc; font-weight: 800; }
        .yt-icon { color: #ff0000; text-decoration: none; }

        /* 입력창 스타일 */
        .input-form { display: flex; flex-direction: column; gap: 15px; text-align: left; }
        .input-group label { font-size: 0.75rem; color: var(--text-dim); font-weight: 800; margin-bottom: 5px; display: block; }
        input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #374151;
            background: #f9fafb; color: #000; font-size: 1rem; box-sizing: border-box;
        }
