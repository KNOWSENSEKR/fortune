<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노센스 투자운세 v1.2</title>
    <style>
        :root { 
            /* 심리적으로 차분하고 부드러운 파스텔 톤 설정 */
            --bg-light: #fefaf5; /* 부드러운 크림색 배경 */
            --card-light: #ffffff; /* 깨끗한 흰색 카드 */
            --primary-purple: #b695da; /* 부드러운 파스텔 라벤더 포인트 */
            --text-main: #334155; /* 진한 회색 텍스트 (가독성 확보) */
            --text-dim: #718096; /* 부드러운 회색 설명 텍스트 */
            --invest-red-soft: #ffb8c5; /* 부드러운 코랄/핑크 */
            --lucky-gold-soft: #f9e1a3; /* 부드러운 골드 */
            --quote-purple-soft: #dbccff; /* 부드러운 라벤더 격언 배경 */
        }
        
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--bg-light); 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center;
            color: var(--text-main); min-height: 100vh;
        }

        .container { 
            width: 100%; max-width: 420px; 
            background-color: var(--card-light); 
            border-radius: 28px; padding: 35px; 
            box-shadow: 0 15px 35px rgba(210, 201, 191, 0.2); /* 부드러운 그림자 */
            border: 1px solid rgba(210, 201, 191, 0.1);
            text-align: center; box-sizing: border-box;
            position: relative;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f1f1f1; padding-bottom: 15px; }
        h1 { font-size: 1.3rem; margin: 0; color: #8e44ad; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .yt-icon { color: #ff0000; text-decoration: none; display: flex; transition: 0.3s; }
        .yt-icon:hover { transform: scale(1.1); }

        /* 입력 폼 */
        .input-form { display: flex; flex-direction: column; gap: 18px; text-align: left; }
        .input-group label { font-size: 0.8rem; color: var(--text-dim); font-weight: bold; display: block; margin-bottom: 6px; }
        input { 
            width: 100%; padding: 16px; border-radius: 14px; border: 2px solid #e2e8f0;
            background: #f8fafc; color: #1e293b; font-size: 1rem; box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary-purple); box-shadow: 0 0 0 3px rgba(182, 149, 218, 0.1); }

        .btn-analyze { 
            background: var(--primary-purple); color: white; border: none;
            padding: 18px; border-radius: 16px; font-weight: 800; font-size: 1.1rem;
            cursor: pointer; margin-top: 10px; width: 100%; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(182, 149, 218, 0.2);
        }
        .btn-analyze:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(182, 149, 218, 0.3); }
        .btn-analyze:active { transform: translateY(1px) scale(0.98); }

        /* 결과 화면 */
        #resultArea { display: none; margin-top: 25px; text-align: left; animation: fadeIn 0.4s ease; }
        .fortune-card { 
            background: #fdfdfd; border-radius: 20px; 
            padding: 22px; margin-bottom: 15px; 
            border: 2px solid #e2e8f0;
            border-left: 6px solid var(--primary-purple);
        }
        .tag { font-size: 0.8rem; font-weight: 800; color: var(--text-dim); display: block; margin-bottom: 10px; text-transform: uppercase; }
        .content { font-size: 1.1rem; line-height: 1.8; color: var(--text-main); margin: 0; word-break: keep-all; font-weight: 500; }
        
        /* 각 카드별 포인트 컬러 */
        .gen-box { border-left-color: #a3daff; }
        .inv-box { border-left-color: #ffb8c5; }
        .lucky-box { border-left-color: #f9e1a3; text-align: center; }
        .quote-box { border-left-color: var(--quote-purple-soft); background: rgba(219, 204, 255, 0.2); }
        .quote-text { font-size: 1.3rem; font-weight: 800; color: #4c1d95; text-align: center; font-style: italic; }
        
        .lucky-ball { 
            background: linear-gradient(135deg, #f9e1a3, #f59e0b); 
            width: 70px; height: 70px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            margin: 15px auto 0; font-size: 2rem; font-weight: 900; color: #333;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.2);
        }

        .btn-footer { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .btn-copy { background: #6dd4b3; color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-copy:hover { background: #56c9a2; }
        .btn-reset { background:#cbd5e1; color:#334155; border:none; padding:14px; border-radius:12px; cursor:pointer; font-weight:bold; font-size:0.95rem; }
        .btn-reset:hover { background:#b4c3d1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🔮 노센스 투자운세 v1.2</h1>
