<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노센스 투자운세보기 v1.1</title>
    <style>
        :root { 
            --bg-dark: #0f111a; 
            --card-dark: #1a1d2e; 
            --primary-accent: #6c5ce7; 
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --invest-red: #ff4757;
            --lucky-gold: #ffa502;
            --quote-purple: #a55eea;
        }
        
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--bg-dark); /* 배경색 강제 지정 */
            margin: 0; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            color: var(--text-main); 
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            background-color: var(--card-dark); 
            border-radius: 32px; 
            padding: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 20px;
            box-sizing: border-box;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 2rem; 
        }

        h1 { 
            font-size: 1.3rem; 
            margin: 0; 
            background: linear-gradient(to right, #a55eea, #45aaf2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .youtube-link { color: #ff0000; text-decoration: none; }

        .input-form { display: flex; flex-direction: column; gap: 15px; }
        .input-group { text-align: left; }
        .input-group label { font-size: 0.8rem; color: var(--text-dim); font-weight: bold; margin-bottom: 5px; display: block; }
        
        input { 
            width: 100%; 
            padding: 16px; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 16px; 
            color: #ffffff; 
            font-size: 1rem; 
            box-sizing: border-box;
        }

        button { 
            padding: 18px; 
            border: none; 
            border-radius: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1.1rem; 
            transition: 0.3s;
            width: 100%;
        }
        .btn-main { 
            background: linear-gradient(135deg, #6c5ce7, #a55eea); 
            color: white; 
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
            margin-top: 10px;
        }

        #resultArea { display: none; margin-top: 25px; animation: fadeIn 0.5s ease; }
        
        .fortune-card { 
            background: rgba(255,255,255,0.05); 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.08);
            text-align: left;
        }
        
        .tag { font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 6px; display: inline-block; margin-bottom: 10px; }
        .tag-gen { background: rgba(69, 170, 242, 0.2); color: #45aaf2; }
        .tag-inv { background: rgba(255, 71, 87, 0.2); color: var(--invest-red); }
        .tag-lucky { background: rgba(255, 165, 2, 0.2); color: var(--lucky-gold); }
        .tag-quote { background: rgba(165, 94, 234, 0.2); color: var(--quote-purple); }

        .content { font-size: 1rem; line-height: 1.6; color: #e2e8f0; margin: 0; word-break: keep-all; }
        .quote-text { font-size: 1.2rem; font-weight: 800; color: #ffffff; text-align: center; }
        
        .lucky-num-ball { 
            background: linear-gradient(135deg, #ffa502, #ff7f50); 
            width: 60px; height: 60px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            margin: 10px auto; font-size: 1.8rem; font-weight: 900; color: #000;
        }

        .btn-copy { background: #26de81; color: #004d2e; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
