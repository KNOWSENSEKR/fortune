<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음코드 - 투자 & 인생 운세 리포트</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" integrity="sha384-lLeY66p7Z37zT7B9p3WzPOnTzO3G4FzZf5W/4x3f0vU=" crossorigin="anonymous"></script>
    <style>
        :root { --primary: #2563eb; --invest: #dc2626; --bg: #f1f5f9; --card: #ffffff; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: var(--card); border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 1.4rem; color: #1e293b; text-align: center; margin-bottom: 2rem; }
        .input-form { display: flex; flex-direction: column; gap: 12px; }
        input { padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; }
        input:focus { border-color: var(--primary); outline: none; }
        button { padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; margin-top: 10px; }
        .btn-kakao { background: #fee500; color: #3c1e1e; margin-top: 10px; display: none; width: 100%; }
        
        #resultArea { display: none; margin-top: 25px; animation: slideUp 0.4s ease-out; }
        .fortune-box { background: #f8fafc; padding: 18px; border-radius: 16px; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .fortune-box.invest { border-left-color: var(--invest); }
        .label { font-size: 0.8rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .content { color: #334155; line-height: 1.6; font-size: 1rem; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>🔮 오늘의 투자 & 인생 운세</h1>
    
    <div class="input-form" id="inputForm">
        <input type="text" id="userName" placeholder="이름 입력" required>
        <input type="date" id="userBirth" required>
        <button class="btn-main" onclick="calculateFortune()">운세 리포트 생성</button>
    </div>

    <div id="resultArea">
        <div class="fortune-box">
            <span class="label">📅 오늘의 종합운</span>
            <p class="content" id="generalTxt"></p>
        </div>
        <div class="fortune-box invest">
            <span class="label">📈 투자 & 재물운</span>
            <p class="content" id="investTxt"></p>
        </div>
        <button class="btn-kakao" id="kakaoBtn" onclick="shareKakao()">카카오톡으로 결과 공유</button>
        <button class="btn-main" style="background:#94a3b8" onclick="location.reload()">다시 하기</button>
    </div>
</div>

<script>
    // 카카오 SDK 초기화 (본인의 앱 키가 있다면 여기에 넣으세요)
    if (!Kakao.isInitialized()) {
        Kakao.init('YOUR_KAKAO_JS_KEY'); // 발급 전이면 공유 기능만 작동 안 함
    }

    const data = {
        general: [
            "주변의 조언보다는 본인의 직관을 믿어야 하는 하루입니다.",
            "뜻밖의 귀인이 나타나 막혔던 문제를 해결해 줄 기운입니다.",
            "오늘은 에너지를 비축하세요. 내일을 위한 준비가 필요한 때입니다.",
            "작은 실수가 큰 배움이 됩니다. 자신감을 잃지 마세요.",
            "대인관계에서 양보가 큰 이득으로 돌아오는 날입니다."
        ],
        invest: [
            "심리적 평단가를 낮추세요. 조급함이 가장 큰 적입니다.",
            "차트보다는 거시적인 흐름을 읽는 데 집중해야 할 시기입니다.",
            "오늘의 매수는 신중히, 매도는 과감히 결정하는 것이 좋습니다.",
            "원칙을 지키는 매매가 최고의 수익률을 보장합니다.",
            "정보의 홍수 속에서 진짜 뉴스를 가려내는 안목이 필요한 날입니다."
        ]
    };

    function calculateFortune() {
        const name = document.getElementById('userName').value;
        const birth = document.getElementById('userBirth').value;
        
        if(!name || !birth) { alert("정보를 모두 입력해 주세요."); return; }

        // 로직: 생년월일 숫자 + 오늘 날짜 숫자를 합쳐서 인덱스 생성 (매일 변함)
        const today = new Date();
        const dateSeed = today.getFullYear() + today.getMonth() + today.getDate();
        const birthSeed = parseInt(birth.replace(/-/g, ''));
        const finalSeed = dateSeed + birthSeed;

        const genIdx = finalSeed % data.general.length;
        const invIdx = (finalSeed + 7) % data.invest.length; // 투자운은 다른 인덱스 사용

        document.getElementById('generalTxt').innerText = data.general[genIdx];
        document.getElementById('investTxt').innerText = data.invest[invIdx];
        
        document.getElementById('inputForm').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('kakaoBtn').style.display = 'block';
    }

    function shareKakao() {
        const name = document.getElementById('userName').value;
        const result = document.getElementById('generalTxt').innerText;

        // 카카오 공유 로직 (실제 키가 있어야 작동)
        if(Kakao.isInitialized()) {
            Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                    title: `${name}님의 오늘의 투자 운세`,
                    description: result,
                    imageUrl: 'https://cdn-icons-png.flaticon.com/512/11542/11542194.png',
                    link: { mobileWebUrl: window.location.href, webUrl: window.location.href },
                },
                buttons: [{ title: '나도 운세 보기', link: { mobileWebUrl: window.location.href, webUrl: window.location.href } }]
            });
        } else {
            alert("카카오 키 설정이 필요합니다. 링크를 복사해 공유해 주세요!");
        }
    }
</script>
</body>
</html>
