<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노센스 투자운세보기 v1.1</title>
    <style>
        :root { 
            --bg-dark: #0f111a; 
            --card-dark: #1a1d2e; 
            --primary-accent: #6c5ce7; 
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --invest-red: #ff4757;
            --lucky-gold: #ffa502;
            --quote-purple: #a55eea;
        }
        
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background: var(--bg-dark); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            color: var(--text-main); 
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            background: var(--card-dark); 
            border-radius: 32px; 
            padding: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.05);
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 2rem; 
        }

        h1 { 
            font-size: 1.3rem; 
            margin: 0; 
            background: linear-gradient(to right, #a55eea, #45aaf2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .youtube-link { color: #ff0000; transition: 0.3s; }
        .youtube-link:hover { transform: scale(1.1) rotate(5deg); }

        /* 입력 폼 스타일 */
        .input-form { display: flex; flex-direction: column; gap: 15px; }
        .input-group label { font-size: 0.8rem; color: var(--text-dim); margin-left: 5px; }
        input { 
            width: 100%; 
            padding: 16px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 16px; 
            color: white; 
            font-size: 1rem; 
            box-sizing: border-box;
            margin-top: 5px;
        }
        input:focus { outline: none; border-color: var(--primary-accent); background: rgba(255,255,255,0.08); }

        button { 
            padding: 18px; 
            border: none; 
            border-radius: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1.1rem; 
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-main { 
            background: linear-gradient(135deg, #6c5ce7, #a55eea); 
            color: white; 
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(108, 92, 231, 0.4); }

        /* 결과 카드 스타일 */
        #resultArea { display: none; animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .fortune-card { 
            background: rgba(255,255,255,0.03); 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .fortune-card:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
        
        .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .tag { font-size: 0.75rem; font-weight: 700; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
        
        .tag-gen { background: rgba(69, 170, 242, 0.2); color: #45aaf2; }
        .tag-inv { background: rgba(255, 71, 87, 0.2); color: var(--invest-red); }
        .tag-lucky { background: rgba(255, 165, 2, 0.2); color: var(--lucky-gold); }
        .tag-quote { background: rgba(165, 94, 234, 0.2); color: var(--quote-purple); }

        .content { font-size: 1rem; line-height: 1.6; color: #cbd5e1; margin: 0; }
        .content.highlight { font-size: 1.2rem; font-weight: 800; color: white; text-align: center; }
        
        .lucky-num-ball { 
            background: linear-gradient(135deg, #ffa502, #ff7f50);
